- id: '1759218371444'
  alias: Send Persistent Notice to Telegram
  triggers:
  - event_type: call_service
    trigger: event
  conditions:
  - condition: and
    conditions:
    - condition: template
      value_template: '{{ trigger.event.data.domain == ''persistent_notification''
        }}'
    - condition: template
      value_template: '{{ trigger.event.data.service == ''create'' }}'
  actions:
  - data:
      message: 'Trigger data: {{ trigger.event.data }}'
    action: system_log.write
  - data:
      message: 'Persistent Notify: **{{ trigger.event.data.service_data.title }}**
        {{ trigger.event.data.service_data.message }}'
    action: telegram_bot.send_message
- id: '1760009530526'
  alias: 'Strömövervakning: Faser över 16A i 2 minuter'
  description: ''
  triggers:
  - entity_id: sensor.frient_electricity_strom
    above: 16
    for:
      minutes: 2
    trigger: numeric_state
  - entity_id: sensor.frient_electricity_strom_fas_b
    above: 16
    for:
      minutes: 2
    trigger: numeric_state
  - entity_id: sensor.frient_electricity_strom_fas_c
    above: 16
    for:
      minutes: 2
    trigger: numeric_state
  actions:
  - data:
      message: "{% if trigger.entity_id == 'sensor.frient_electricity_strom' %}\n
        \ ⚡ Fas A har varit över 16A i mer än 2 minuter!\n{% elif trigger.entity_id
        == 'sensor.frient_electricity_strom_fas_b' %}\n  ⚡ Fas B har varit över 16A
        i mer än 2 minuter!\n{% elif trigger.entity_id == 'sensor.frient_electricity_strom_fas_c'
        %}\n  ⚡ Fas C har varit över 16A i mer än 2 minuter!\n{% else %}\n  ⚠️ Okänd
        fas har överskridit gränsen.\n  Entitet: {{ trigger.entity_id }}\n  Värde:
        {{ trigger.to_state.state }} {{ trigger.to_state.attributes.unit_of_measurement
        or 'okänd enhet' }}\n{% endif %}\n"
    action: telegram_bot.send_message
  mode: single
