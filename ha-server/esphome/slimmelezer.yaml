substitutions:
  device_name: slimmelezer

external_components:
  - source:
      type: git
      url: https://github.com/Beaky2000/esphome-p1mini
      ref: main
    components: [p1_mini]
    refresh: 1d

esphome:
  name: ${device_name}

esp8266:
  board: esp12e
  restore_from_flash: true

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  ap:
    ssid: !secret fallback_ssid
    password: !secret fallback_password

captive_portal:

logger:
  level: DEBUG
  baud_rate: 0

api:
  encryption:
    key: !secret encryption_key

ota:
  platform: esphome
  password: !secret ota_password

uart:
  - id: my_uart_1
    rx_pin:
      number: GPIO13
      inverted: false
    tx_pin:
      number: GPIO15
      inverted: false
      mode: OUTPUT_OPEN_DRAIN
    baud_rate: 115200
    rx_buffer_size: 3072

p1_mini:
  - id: p1_mini_1
    uart_id: my_uart_1
    buffer_size: 3072
    minimum_period: 0s

binary_sensor:

sensor:
  - platform: p1_mini
    p1_mini_id: p1_mini_1
    obis_code: "1.8.0"
    name: "Cumulative Active Import"
    unit_of_measurement: kWh
    accuracy_decimals: 3
    state_class: total_increasing
    device_class: energy

  - platform: p1_mini
    p1_mini_id: p1_mini_1
    obis_code: "1.7.0"
    name: "Momentary Active Import"
    unit_of_measurement: kW
    accuracy_decimals: 3
    device_class: power
    state_class: measurement

  - platform: p1_mini
    p1_mini_id: p1_mini_1
    obis_code: "32.7.0"
    name: "Voltage Phase 1"
    unit_of_measurement: V
    accuracy_decimals: 1
    device_class: voltage
    state_class: measurement

  - platform: p1_mini
    p1_mini_id: p1_mini_1
    obis_code: "52.7.0"
    name: "Voltage Phase 2"
    unit_of_measurement: V
    accuracy_decimals: 1
    device_class: voltage
    state_class: measurement

  - platform: p1_mini
    p1_mini_id: p1_mini_1
    obis_code: "72.7.0"
    name: "Voltage Phase 3"
    unit_of_measurement: V
    accuracy_decimals: 1
    device_class: voltage
    state_class: measurement

  - platform: p1_mini
    p1_mini_id: p1_mini_1
    obis_code: "31.7.0"
    name: "Current Phase 1"
    unit_of_measurement: A
    accuracy_decimals: 1
    device_class: current
    state_class: measurement

  - platform: p1_mini
    p1_mini_id: p1_mini_1
    obis_code: "51.7.0"
    name: "Current Phase 2"
    unit_of_measurement: A
    accuracy_decimals: 1
    device_class: current
    state_class: measurement

  - platform: p1_mini
    p1_mini_id: p1_mini_1
    obis_code: "71.7.0"
    name: "Current Phase 3"
    unit_of_measurement: A
    accuracy_decimals: 1
    device_class: current
    state_class: measurement

  - platform: p1_mini
    p1_mini_id: p1_mini_1
    obis_code: "21.7.0"
    name: "Momentary Active Import Phase 1"
    unit_of_measurement: kW
    accuracy_decimals: 3
    device_class: power
    state_class: measurement

  - platform: p1_mini
    p1_mini_id: p1_mini_1
    obis_code: "41.7.0"
    name: "Momentary Active Import Phase 2"
    unit_of_measurement: kW
    accuracy_decimals: 3
    device_class: power
    state_class: measurement

  - platform: p1_mini
    p1_mini_id: p1_mini_1
    obis_code: "61.7.0"
    name: "Momentary Active Import Phase 3"
    unit_of_measurement: kW
    accuracy_decimals: 3
    device_class: power
    state_class: measurement