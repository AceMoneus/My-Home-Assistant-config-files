- trigger:
    - platform: time_pattern
      minutes: "5"

  sensor:

    #############################
    # Indoor climate
    #############################
    - name: influx_telemetry_temperature_inhouse
      unique_id: influx_telemetry_temperature_inhouse
      state: "{{ states('sensor.influx_stats_temperature_inhouse') | float(default=0) | round(1) }}"
      unit_of_measurement: "°C"
      device_class: temperature
      state_class: measurement

    - name: influx_telemetry_humidity_inhouse
      unique_id: influx_telemetry_humidity_inhouse
      state: "{{ states('sensor.influx_stats_humidity_inhouse') | float(default=0) | round(0) }}"
      unit_of_measurement: "%"
      device_class: humidity
      state_class: measurement

    #############################
    # Outdoor climate
    #############################
