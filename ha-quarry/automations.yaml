  mode: single
- id: '1730722395853'
  alias: MQTT Timestamp
  description: ''
  triggers:
  - trigger: time_pattern
    minutes: /1
  conditions: []
  actions:
  - action: mqtt.publish
    metadata: {}
    data:
      topic: quarry/timestamp
      retain: true
  - action: mqtt.publish
    metadata: {}
    data:
      topic: quarry/timestamp
      payload: '{{ (as_timestamp(now()) | timestamp_local) }}'
      retain: true
  mode: single
- id: '1761301123800'
  alias: Quarry Github Commit
  description: ''
  triggers:
  - trigger: time
    at: 05:00:00
  conditions: []
  actions:
  - action: shell_command.git_sync
    metadata: {}
    data: {}
  mode: single
- id: '1781637271521'
  alias: Handle incoming user message
  description: ''
  triggers:
  - topic: quarry/message
    trigger: mqtt
  actions:
  - choose:
    - conditions:
      - condition: template
        value_template: '{{ data.target == ''kjell'' }}'
      sequence:
      - data:
          message: '{{ data.message }}'
        action: notify.mobile_app_kjellmobil
    - conditions:
      - condition: template
        value_template: '{{ data.target == ''bettan'' }}'
      sequence:
      - data:
          message: '{{ data.message }}'
        action: notify.mobile_app_bettan_phone
    - conditions:
      - condition: template
        value_template: '{{ data.target == ''both'' }}'
      sequence:
      - data:
          message: '{{ data.message }}'
        action: notify.mobile_app_kjellmobil
      - data:
          message: '{{ data.message }}'
        action: notify.mobile_app_bettan_phone
  - if:
    - condition: template
      value_template: '{{ data.telegram | default(false) | bool }}'
    then:
    - data:
        message: '{{ data.message }}'
      action: telegram_bot.send_message
  - if:
    - condition: template
      value_template: '{{ trigger.payload is not none and trigger.payload != ''''
        }}'
    then:
    - data:
        topic: quarry/message
        payload: ''
        retain: true
      action: mqtt.publish
  mode: queued
  max: 10
  variables:
    data: '{{ trigger.payload_json | default({}) }}'
- id: '1781689112504'
