- id: '1662194898234'
  alias: Telegram - HA Boot
  description: ''
  triggers:
  - event: start
    trigger: homeassistant
  conditions: []
  actions:
  - action: automation.trigger
    target:
      entity_id: automation.send_user_message
    data:
      skip_condition: true
      variables:
        target: local
        message: Quarry started
        telegram: false
  mode: single
- id: '1662207023146'
  alias: Telegram Reply with Status
  description: ''
  trigger:
  - platform: event
    event_type: telegram_command
    event_data:
      command: /start
  condition: []
  action:
  - service: notify.telegram
    data:
      message: -- HA Quarry (HAQ) --Up and running :)
      title: HAQ - Status
  - service: notify.telegram
    data:
      message: Front
      title: Front
      data:
        photo:
        - url: https://pm3.se/wp-content/uploads/2019/05/startheropic.jpg
  mode: single
- id: '1670625054247'
  alias: Telegram - Reboot
  description: ''
  trigger:
  - platform: event
    event_type: telegram_command
    event_data:
      command: /reboot
  condition: []
  action:
  - service: hassio.host_reboot
    data: {}
  mode: single
- id: '1675081741277'
  alias: Telegram - HA shut down
  description: ''
  triggers:
  - event: shutdown
    trigger: homeassistant
  conditions: []
  actions:
  - action: automation.trigger
    target:
      entity_id: automation.send_user_message
    data:
      skip_condition: true
      variables:
        target: local
        message: Quarry shut down
